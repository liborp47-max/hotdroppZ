# Dependabot — dependency vulnerability + version hygiene.
# Mission UM-CC_DEPENDENCY_HYGIENE. Weekly cadence, patch/minor only
# (semver-major updates are ignored -> opened manually after review).
version: 2
updates:
  # ── backend (NestJS) ──────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # ── command-centrum (Next.js dashboard) ──────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/command-centrum"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "command-centrum"
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # ── frontend-web (Next.js public site) ───────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend-web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend-web"
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # ── ai (Python pipeline) ─────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/ai"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ai"
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
